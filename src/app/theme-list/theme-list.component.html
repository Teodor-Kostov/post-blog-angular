<main>
    <app-loader [isLoading]="isLoading" />

    <div class="theme-title" *ngIf="!isLoading">
        <div class="theme-container" *ngFor="let theme of themes">
            <div class="theme-name-wrapper">
                <div class="theme-name">
                    <a href="#" class="normal">
                        <h2>{{ theme.themeName }}</h2>
                    </a>
                    <div class="columns">
                        <div>
                            <p>Date: <time>{{ theme.created_at }}</time></p>
                            <div class="nick-name">
                                <p>Username: <span>{{ theme.userId.username }}</span></p>
                            </div>
                        </div>
                        <div class="subscribers">
                            <p>Subscribers: <span>{{ theme.subscribers.length || 0 }}</span></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <p *ngIf="themes.length === 0">No themes available.</p>
    </div>
</main>
