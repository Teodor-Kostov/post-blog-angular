<div class="container">
    <div class="new-theme-border">
        <div class="header-background">
            <span>New Theme</span>
        </div>
        <form>
            <div class="new-theme-title">
                <label for="themeName">Title <span class="red">*</span></label>
                <input type="text" name="themeName" id="themeName" #themeName>
                @if (themeName.value && themeName.value.length < 5) {
                    <p class="error">Theme name must be at least 5 characters long.</p>
                }
            </div>
            <div class="new-theme-content">
                <label for="postText">Post <span class="red">*</span></label>
                <textarea
                    name="postText"
                    id="postText"
                    rows="8"
                    class="height"
                    #postText
                ></textarea>
                @if (postText.value && postText.value.length < 10) {
                    <p class="error">Post must be at least 10 characters long.</p>
                }
            </div>
            <div class="new-theme-buttons">
                <button type="button" class="cancel" (click)="onCancel()">Cancel</button>
                <button
                    type="submit"
                    class="public"
                    (click)="addTheme( themeName.value, postText.value, $event)"
                >Post</button>
            </div>
        </form>
    </div>
</div>
